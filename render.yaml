services:
  - type: web
    name: btc-momentum-bot
    runtime: python
    buildCommand: echo ok
    startCommand: python3 bot.py
    plan: free
    envVars:
      - key: PAIR
        value: ETHGBP
      - key: POLL_SEC
        value: "15"
      - key: SESSION_SEC
        value: "86400"
      - key: START_GBP
        value: "10000"
      - key: FEE_RATE
        value: "0.0026"
      - key: TP_PCT
        value: "0.0070"
      - key: SL_PCT
        value: "0.0040"
      - key: MOMENTUM_MIN
        value: "0.0003"
      - key: TRADE_FRAC
        value: "0.90"
